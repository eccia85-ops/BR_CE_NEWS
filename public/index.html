<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CE News Monitor</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    h2 { margin-top: 40px; }
    ul { padding-left: 18px; }
    li { margin-bottom: 6px; }
    .site { color: #555; font-size: 12px; }
  </style>
</head>
<body>
  <h1>📊 CE 키워드 뉴스</h1>
  <div id="app"></div>

  <script>
    fetch("/api/news")
      .then(r => r.json())
      .then(data => {
        const app = document.getElementById("app");
        for (const key of data.keywords) {
          const items = data.data[key];
          if (items.length === 0) continue;

          app.innerHTML += `<h2>${key} (${items.length})</h2><ul>` +
            items.map(i =>
              `<li>${i.title}
                <div class="site">${i.site}</div>
              </li>`
            ).join("") +
            "</ul>";
        }
      });
  </script>
</body>
</html>
